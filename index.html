<!DOCTYPE html>
<html>
<head>
<title>DMB</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background-image:
        linear-gradient(rgba(26, 20, 20, 0.75), rgba(0, 0, 0, 0.85)),
        url('fundo.jpg'); 
    
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
}

.topo {
    background: #1a2a3a;
    padding: 15px;
    border-bottom: 5px solid #d4a017;
    text-align: center;
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 40px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.menu {
    display: grid;
    grid-template-columns: repeat(2, 200px);
    gap: 30px;
    justify-content: center;
    margin-top: 50px;
}

.botao {
    width: 200px;
    height: 100px;
    background: rgba(44, 94, 148, 0.9); 
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.botao:hover {
    background: #3e7cc2;
    transform: scale(1.05);
    box-shadow: 0px 0px 20px rgba(62, 124, 194, 0.6);
}

a {
    text-decoration: none;
    color: white;
}
</style>

</head>
<body>

<div class="topo">
    DEPARTAMENTO DE MATERIAL BÉLICO
</div>

<div class="menu">
    <a href="cadastro_de_armas/cadastro.html">
        <div class="botao">CADASTRAR</div>
    </a>

    <a href="armas.html">
        <div class="botao">ARMAS</div>
    </a>

    <a href="../projeto DMB/processos.exec/processos.html">
        <div class="botao">PROCESSOS</div>
    </a>

    <a href="consulta.exec/consulta.html">
        <div class="botao">CONSULTAR</div>
    </a>
</div>

</body>
</html>
