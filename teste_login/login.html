<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <style>
        :root {
            --primary: #d4a017;
            --secondary: #0062ff;
            --bg-dark: #020b16;
            --accent: #ff0055;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Orbitron, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle, #051937, #020b16);
        }

        /* Efeito de Grade de Fundo */
        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* Container Principal */
        .login-card {
            background: rgba(10, 25, 47, 0.7);
            padding: 40px;
            border-radius: 5px;
            border-left: 4px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
            backdrop-filter: blur(10px);
            width: 350px;
            position: relative;
            clip-path: polygon(0% 0%, 100% 0%, 100% 90%, 85% 100%, 0% 100%);
        }

        
        

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        h2 {
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.6);
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 10px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 20px var(--primary);
        }

        /* Créditos do Desenvolvedor */
        .dev-credit {
            margin-top: 30px;
            font-size: 0.6rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dev-credit span {
            color: var(--accent);
            font-weight: bold;
        }

        /* Elementos Decorativos de UI */
        .corner-decoration {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
        }
        .top-right { top: -2px; right: -2px; border-bottom: none; border-left: none; }
    </style>
</head>
<body>

    <div class="background-grid"></div>

    <div class="login-card">
        <div class="scanner-line"></div>
        <div class="corner-decoration top-right"></div>
        
        <h2>DIVISÃO DE MATERIAL  BÉLICO</h2>
        <p style="font-size: 0.6rem; color: #ff0055; margin-top: -20px; margin-bottom: 20px;">ÁREA DE ACESSO RESTRITO</p>

        <form>
            <div class="input-group">
                <label>MATRÍCULA</label>
                <input type="text" placeholder="PX-9902" required>
            </div>
            <div class="input-group">
                <label>SENHA</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            
            <button type="button">AUTENTICAR SISTEMA</button>
        </form>

        <div class="dev-credit">
            Sistema desenvolvido por <br>
            <span> MISAEL & VINÍCIUS </span> <br>
            © 2026 Cyber-Security Div.
        </div>
    </div>

</body>
</html>
