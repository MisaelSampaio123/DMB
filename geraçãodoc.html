<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Arsenal OS - Oficial & Auditoria</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --danger: #b71c1c; --dark: #121212; --panel: #1e1e1e; --accent: #00e5ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: #eceff1; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .panel { background: var(--panel); padding: 20px; border-radius: 5px; border: 1px solid #333; }
        
        /* Assinatura */
        #signature-pad { border: 1px dashed var(--accent); background: #000; cursor: crosshair; }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        
        button { border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 3px; }
        .btn-pdf { background: #455a64; color: white; }
        .btn-caution { background: var(--danger); color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        th { color: var(--accent); font-size: 0.8em; text-transform: uppercase; }

        .log-box { height: 200px; overflow-y: scroll; background: #000; padding: 10px; font-family: monospace; font-size: 12px; color: #4caf50; }
    </style>
</head>
<body>

<div class="grid">
    <div class="panel">
        <h2>📦 Movimentação de Ativos</h2>
        <div class="btn-group">
            <input type="text" id="opNome" placeholder="Nome do Responsável">
            <input type="text" id="armaNome" placeholder="Armamento/Série">
            <input type="number" id="qtd" placeholder="Qtd">
            <button class="btn-caution" onclick="gerarTermoCautela()">Gerar Termo de Cautela</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Responsável Atual</th>
                    <th>Data/Hora</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabelaInventario">
                </tbody>
        </table>
    </div>

    <div class="panel">
        <h3>✍️ Assinatura Digital</h3>
        <canvas id="signature-pad" width="310" height="150"></canvas>
        <button onclick="clearCanvas()" style="background:#333; font-size:10px;">Limpar Assinatura</button>
        
        <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">
        
        <h3>📊 Relatórios</h3>
        <button class="btn-pdf" onclick="gerarRelatorioAuditoria()">Exportar Log de Auditoria (PDF)</button>
        <div class="log-box" id="logAuditoria">
            [SISTEMA PRONTO]
        </div>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let logs = [];

    // Lógica da Assinatura
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let writing = false;

    canvas.addEventListener('mousedown', () => writing = true);
    canvas.addEventListener('mouseup', () => writing = false);
    canvas.addEventListener('mousemove', (e) => {
        if (!writing) return;
        ctx.fillStyle = "#00e5ff";
        ctx.fillRect(e.offsetX, e.offsetY, 2, 2);
    });

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // GERAÇÃO DE TERMO DE CAUTELA
    function gerarTermoCautela() {
        const doc = new jsPDF();
        const nome = document.getElementById('opNome').value || "NÃO INFORMADO";
        const arma = document.getElementById('armaNome').value || "NÃO INFORMADO";
        const data = new Date().toLocaleString();

        doc.setFontSize(18);
        doc.text("TERMO DE CAUTELA E RESPONSABILIDADE", 20, 20);
        
        doc.setFontSize(12);
        doc.text(`Data de Emissão: ${data}`, 20, 40);
        doc.text(`Responsável/Operador: ${nome}`, 20, 50);
        doc.text(`Equipamento: ${arma}`, 20, 60);
        
        doc.text("Pelo presente termo, o abaixo assinado declara ter recebido o equipamento", 20, 80);
        doc.text("acima descrito em perfeitas condições de uso, responsabilizando-se", 20, 85);
        doc.text("por sua guarda, conservação e devolução.", 20, 90);

        // Adiciona a assinatura do canvas ao PDF
        const sigData = canvas.toDataURL('image/png');
        doc.addImage(sigData, 'PNG', 20, 110, 50, 25);
        doc.text("__________________________", 20, 140);
        doc.text("Assinatura do Responsável", 20, 145);

        doc.save(`Cautela_${nome.replace(/ /g, "_")}.pdf`);
        registrarLog(`Termo de Cautela gerado para ${nome}`);
    }

    // GERAÇÃO DE RELATÓRIO DE AUDITORIA
    function gerarRelatorioAuditoria() {
        const doc = new jsPDF();
        doc.text("RELATÓRIO OFICIAL DE AUDITORIA - ARSENAL", 20, 20);
        let y = 40;
        
        logs.forEach(log => {
            doc.setFontSize(10);
            doc.text(log, 20, y);
            y += 10;
        });

        doc.save("Relatorio_Auditoria.pdf");
    }

    function registrarLog(msg) {
        const time = new Date().toLocaleTimeString();
        const fullMsg = `[${time}] ${msg}`;
        logs.push(fullMsg);
        document.getElementById('logAuditoria').innerHTML += `<div>${fullMsg}</div>`;
    }
</script>

</body>
</html>
