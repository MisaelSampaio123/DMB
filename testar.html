<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Policial - DMB</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f141a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        /* Container principal para alinhar login e logo lado a lado */
        .main-container {
            display: flex;
            align-items: center;
            gap: 80px; /* Espaço entre o login e a logo */
            max-width: 1000px;
            width: 90%;
        }

        /* Caixa de Login (Esquerda) */
        .login-box {
            background: #1b2530;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
            border-top: 4px solid #d4a017; /* Detalhe superior */
        }

        /* Container da Logo (Direita) */
        .logo-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-grande {
            width: 100%;
            max-width: 500px; /* Aumentei o tamanho da logo */
            height: auto;
            filter: drop-shadow(0px 0px 20px rgba(212, 160, 23, 0.3)); /* Brilho sutil na logo */
        }

        h2 {
            color: #d4a017;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #2c3e50;
            background: #0f141a;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #d4a017;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #d4a017;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            color: #1b2530;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #f1b71c;
            transform: translateY(-2px);
        }

        #erro {
            color: #ff4d4d;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }

        /* Responsividade para celulares */
        @media (max-width: 800px) {
            .main-container {
                flex-direction: column-reverse;
                gap: 40px;
            }
            .logo-grande {
                max-width: 200px;
            }
        }
    </style>
</head>

<body>

    <div class="main-container">
        
        <div class="login-box">
            <h2>Divisão de Material Bélico</h2>
            <form onsubmit="event.preventDefault(); verificarLogin();">
                <input type="text" id="matricula" placeholder="Matrícula" required>
                <input type="password" id="senha" placeholder="Senha" required>
                <button type="submit">Entrar no Sistema</button>
                <p id="erro"></p>
            </form>
        </div>

        <div class="logo-container">
            <img src="DMB correto1.png" alt="Logo DMB" class="logo-grande">
        </div>

    </div>

    <script>
        function verificarLogin() {
            const matricula = document.getElementById("matricula").value;
            const senha = document.getElementById("senha").value;
            const erroMsg = document.getElementById("erro");

            if (matricula === "12345" && senha.toLowerCase() === "policial") {
                window.location.href = "../index.html"; 
            } else {
                erroMsg.innerText = "Credenciais inválidas. Tente novamente.";
            }
        }
    </script>

    <h1>MIsael e bem gay</h1>
    <p>Beeeemmmmm gay</p>

</body>
</html>
