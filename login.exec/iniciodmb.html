<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMB | Acesso ao Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0f14;
            --card-blue: #101820;
            --accent-gold: #d4a017;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --input-bg: #0d131a;
            --border: #1e293b;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container Principal */
        .main-wrapper {
            display: flex;
            width: 950px;
            height: 600px;
            background: var(--card-blue);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid var(--border);
        }

.side-visual {
    flex: 1.2;
    position: relative;
    /* Substituí o link quebrado por um gradiente tático e uma cor sólida escura */
    background: #0f172a; 
    background-image: 
        linear-gradient(135deg, rgba(16, 24, 32, 0.9) 0%, rgba(10, 15, 20, 0.7) 100%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 4px); /* Textura de linhas táticas */
    display: flex;
    flex-direction: column;
    padding: 40px;
}

        .brand-header {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand-logo {
            width: 45px;
            height: 45px;
        }

        .brand-text {
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        /* Lado Direito - Formulário */
        .side-form {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #101820;
            border-left: 1px solid var(--border);
        }

        .login-title {
            margin: 0;
            color: var(--text-main);
            font-size: 1.8rem;
            font-weight: 700;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 35px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 160, 23, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: var(--accent-gold);
            color: var(--card-blue);
        }

        .footer-links {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: left;
        }

        .footer-links a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
        }

        .top-right-link {
            position: absolute;
            top: 40px;
            right: 40px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Responsividade básica */
        @media (max-width: 900px) {
            .side-visual { display: none; }
            .main-wrapper { width: 400px; height: auto; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <span class="top-right-link">Já possui credencial PMRR? <a href="#" style="color: var(--accent-gold); text-decoration: none;">Logar aqui</a></span>

        <div class="side-visual">
            <div class="brand-header">
                <img src="DMB correto1.png" alt="DMB" class="brand-logo">
                <div class="brand-text">DMB | PMRR</div>
            </div>
        </div>

        <div class="side-form">
            <h1 class="login-title">Solicitar Acesso</h1>
            <p class="login-subtitle">Cadastro de Material Bélico</p>

            <form action="#">
                <div class="form-group">
                    <label>CPF / Matrícula</label>
                    <input type="text" placeholder="Seu CPF ou Matrícula PMRR">
                </div>

                <div class="form-group">
                    <label>Nova Senha de Acesso</label>
                    <input type="password" placeholder="Nova Senha (mínimo 8 caracteres)">
                </div>

                <button type="submit" class="btn-submit">Solicitar Credencial</button>
            </form>

            <div class="footer-links">
                <p>Ao me cadastrar aceito os <strong>termos de segurança</strong> e uso do DMB</p>
                <div style="height: 1px; background: var(--border); margin: 20px 0;"></div>
                <p><strong>Dúvidas sobre o sistema?</strong><br>
                Seu acesso será verificado e autenticado pela Divisão de Material Bélico. <a href="#">Ver FAQ.</a></p>
            </div>
        </div>
    </div>

</body>
</html>
