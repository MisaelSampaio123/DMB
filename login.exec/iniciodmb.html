<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Policial - DMB</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f141a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: #1b2530;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
        }

        .logo {
            width: 140px;
            margin-bottom: 20px;
            border-radius: 50%; /* Opcional: deixa a logo circular se for o caso */
        }

        h2 {
            color: #d4a017; /* Destaque em dourado no título */
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #2c3e50;
            background: #0f141a;
            color: white;
            font-size: 14px;
            box-sizing: border-box; /* Impede o input de sair da caixa */
        }

        input:focus {
            outline: none;
            border-color: #d4a017;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #d4a017;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            color: #1b2530;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #f1b71c;
        }

        #erro {
            color: #ff4d4d;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <!-- Verifique se o caminho da imagem está correto -->
        <img src="DMB correto1.png" alt="Logo DMB" class="logo">

        <h2>Divisão de Material Bélico</h2>

        <!-- Usei 'event' para prevenir o recarregamento da página no teste -->
        <form action="../index.html" onsubmit="event.preventDefault(); verificarLogin();">
            <input type="text" id="matricula" placeholder="Matrícula" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
            <p id="erro"></p>
        </form>
    </div>

        <script>
    function verificarLogin() {
        const matricula = document.getElementById("matricula").value;
        const senha = document.getElementById("senha").value;
        const erroMsg = document.getElementById("erro");

        // Lógica de validação
        if (matricula === "12345" && senha.toLowerCase() === "policial") {
            // REDIRECIONAMENTO AQUI:
            // Se a página estiver na mesma pasta: "dashboard.html"
            // Se a página estiver uma pasta para trás: "../index.html"
            window.location.href = "../index.html"; 

        } else {
            erroMsg.innerText = "Credenciais inválidas. Tente novamente.";
        }
    }
</script>

</body>
</html>
