<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsenal OS - Auditoria & Alertas</title>
    <style>
        :root { --danger: #d32f2f; --warning: #ffa000; --success: #388e3c; --bg: #121212; --panel: #1e1e1e; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #cfd8dc; padding: 20px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .panel { background: var(--panel); padding: 20px; border-radius: 4px; border: 1px solid #333; }
        h2 { color: var(--danger); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        /* Alertas */
        .alert-box { background: #420000; border: 1px solid var(--danger); color: #ff8a80; padding: 10px; margin-bottom: 15px; display: none; animation: blink 2s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th { background: #263238; color: #90a4ae; text-align: left; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #333; }

        /* Log de Auditoria */
        .log-container { height: 400px; overflow-y: auto; font-size: 0.8em; background: #000; padding: 10px; border: 1px solid #444; color: #4caf50; }
        .log-entry { margin-bottom: 5px; border-left: 2px solid #4caf50; padding-left: 5px; }
        .log-time { color: #888; }

        input, select, button { background: #333; border: 1px solid #555; color: white; padding: 8px; margin: 5px 0; }
        button { cursor: pointer; background: var(--danger); font-weight: bold; }
        button:hover { background: #b71c1c; }
    </style>
</head>
<body>

    <div id="alertSystem" class="alert-box">🚨 ALERTA: MOVIMENTAÇÃO SUSPEITA DETECTADA OU ESTOQUE BAIXO!</div>

    <div class="grid">
        <div class="panel">
            <h2>📦 Inventário Ativo</h2>
            <div style="margin-bottom: 20px;">
                <input type="text" id="operador" placeholder="Nome do Operador (Ex: Sgt. Silva)">
                <input type="text" id="arma" placeholder="Arma/Equipamento">
                <input type="number" id="qtd" placeholder="Qtd">
                <select id="acao">
                    <option value="Entrada">Entrada (Cautela)</option>
                    <option value="Saída">Saída (Devolução)</option>
                    <option value="Ajuste">Ajuste de Estoque</option>
                </select>
                <button onclick="registrarMovimentacao()">Executar Transação</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Equipamento</th>
                        <th>Qtd Atual</th>
                        <th>Último Operador</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    </tbody>
            </table>
        </div>

        <div class="panel">
            <h2>📜 Auditoria (Logs)</h2>
            <div class="log-container" id="logAudit">
                <div class="log-entry">--- Sistema Iniciado [Aguardando Movimentação] ---</div>
            </div>
        </div>
    </div>

<script>
    // Banco de dados simulado (Em um sistema real, isso viria do servidor)
    let inventario = {
        "Glock G17": { qtd: 10, status: "OK", min: 2 },
        "FAL 7.62": { qtd: 5, status: "OK", min: 1 }
    };

    function atualizarTela() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';
        
        for (let item in inventario) {
            let row = `<tr>
                <td>${item}</td>
                <td>${inventario[item].qtd}</td>
                <td>${inventario[item].ultimo || 'N/A'}</td>
                <td style="color:${inventario[item].qtd <= inventario[item].min ? 'red' : '#4caf50'}">
                    ${inventario[item].qtd <= inventario[item].min ? '⚠️ ESTOQUE BAIXO' : 'OPERACIONAL'}
                </td>
            </tr>`;
            corpo.innerHTML += row;
        }
    }

    function registrarLog(operador, acao, arma, qtd) {
        const log = document.getElementById('logAudit');
        const data = new Date().toLocaleString();
        const entrada = document.createElement('div');
        entrada.className = 'log-entry';
        entrada.innerHTML = `<span class="log-time">[${data}]</span> <strong>${operador}</strong> realizou <strong>${acao}</strong> de ${qtd} un. em ${arma}`;
        log.prepend(entrada);

        // Alerta Inteligente: Movimentação de grande volume
        if (qtd > 50) {
            document.getElementById('alertSystem').style.display = 'block';
            document.getElementById('alertSystem').innerText = `🚨 ALERTA: Movimentação suspeita de alto volume por ${operador}!`;
        }
    }

    function registrarMovimentacao() {
        const op = document.getElementById('operador').value;
        const arma = document.getElementById('arma').value;
        const qtd = parseInt(document.getElementById('qtd').value);
        const acao = document.getElementById('acao').value;

        if(!op || !arma || isNaN(qtd)) return alert("Preencha todos os campos de segurança!");

        if (!inventario[arma]) {
            inventario[arma] = { qtd: 0, min: 2 };
        }

        if (acao === "Entrada") inventario[arma].qtd += qtd;
        if (acao === "Saída") inventario[arma].qtd -= qtd;
        if (acao === "Ajuste") inventario[arma].qtd = qtd;

        inventario[arma].ultimo = op;
        
        registrarLog(op, acao, arma, qtd);
        atualizarTela();
    }

    atualizarTela();
</script>
</body>
</html>
