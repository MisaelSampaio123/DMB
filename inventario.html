<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventário de Armamentos</title>
    <style>
        .btn-voltar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #444;
            color: white;
            padding: 10px 20px;
            border: 1px solid #d32f2f;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-voltar:hover {
            background-color: #d32f2f;
            color: white;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        h2 {
            border-bottom: 2px solid #d32f2f;
            padding-bottom: 10px;
            color: #d32f2f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #444;
        }

        th {
            background-color: #d32f2f;
            color: white;
        }

        tr:hover {
            background-color: #383838;
        }

        .status-ready {
            color: #4caf50;
            font-weight: bold;
        }

        .status-maint {
            color: #ff9800;
            font-weight: bold;
        }

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input,
        select {
            padding: 10px;
            border-radius: 4px;
            border: none;
            background: #444;
            color: white;
        }

        button {
            padding: 10px 20px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #b71c1c;
        }

        .btn-delete {
            background: #555;
            padding: 5px 10px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🛡️ Inventário de Armamentos</h2>

        <div class="form-group">
            <input type="text" id="nome" placeholder="Nome do Equipamento">
            <input type="text" id="calibre" placeholder="Calibre/Tipo">
            <input type="number" id="municao" placeholder="Qtd Munição">
            <select id="status">
                <option value="Operacional">Operacional</option>
                <option value="Manutenção">Manutenção</option>
                <option value="Limpeza">Limpeza</option>
            </select>
            <button onclick="adicionarItem()">Adicionar ao Arsenal</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Calibre</th>
                    <th>Munição</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista-inventario">
            </tbody>
        </table>
    </div>
    <button class="btn-voltar" onclick="window.history.back()">
    ⬅ Voltar
    </button>


    <script>
        function adicionarItem() {
            const nome = document.getElementById('nome').value;
            const calibre = document.getElementById('calibre').value;
            const municao = document.getElementById('municao').value;
            const status = document.getElementById('status').value;

            if (nome === '' || calibre === '') {
                alert("Por favor, preencha os campos básicos.");
                return;
            }

            const tabela = document.getElementById('lista-inventario');
            const novaLinha = tabela.insertRow();

            const statusClass = (status === 'Operacional') ? 'status-ready' : 'status-maint';

            novaLinha.innerHTML = `
            <td><strong>${nome}</strong></td>
            <td>${calibre}</td>
            <td>${municao} un.</td>
            <td class="${statusClass}">${status}</td>
            <td><button class="btn-delete" onclick="removerItem(this)">Excluir</button></td>`;
            // Limpar campos
            document.getElementById('nome').value = '';
            document.getElementById('calibre').value = '';
            document.getElementById('municao').value = '';
        }

        function removerItem(btn) {
            const row = btn.parentNode.parentNode;
            row.parentNode.removeChild(row);
        }
    </script>

</body>

</html>
